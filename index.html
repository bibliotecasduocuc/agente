<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Bibliotecas Duoc UC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --duoc-yellow:#FFC72C;
    --duoc-yellow-soft:#FFF4D6;
    --ink:#15181E;
    --ink-soft:#3A3F49;
    --paper:#FFFFFF;
    --surface:#F5F6F8;
    --line:#E3E5E9;
    --link:#0A5BD3;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--surface);
    color:var(--ink);
    display:flex;
    justify-content:center;
    align-items:stretch;
  }
  .app{
    width:100%;
    max-width:760px;
    height:100vh;
    max-height:100vh;
    display:flex;
    flex-direction:column;
    background:var(--paper);
    border:1px solid var(--line);
    overflow:hidden;
  }
  @media(min-width:800px){
    body{padding:16px}
    .app{height:calc(100vh - 32px);border-radius:var(--radius);box-shadow:0 8px 30px rgba(21,24,30,.08)}
  }
  header{
    background:var(--ink);
    color:#fff;
    padding:14px 18px;
    display:flex;
    align-items:center;
    gap:12px;
    flex-shrink:0;
    border-bottom:4px solid var(--duoc-yellow);
  }
  .logo-mark{
    width:40px;height:40px;border-radius:10px;
    background:var(--duoc-yellow);
    display:flex;align-items:center;justify-content:center;
    font-family:'Archivo';font-weight:800;font-size:18px;color:var(--ink);
    flex-shrink:0;
  }
  .header-text h1{
    font-family:'Archivo',sans-serif;
    font-size:17px;font-weight:700;letter-spacing:-.01em;
    line-height:1.2;
  }
  .header-text p{
    font-size:12px;color:#B9BDC6;margin-top:2px;
  }
  .chat{
    flex:1;
    overflow-y:auto;
    padding:20px 18px 8px;
    scroll-behavior:smooth;
  }
  .msg{
    display:flex;gap:10px;margin-bottom:16px;
    animation:rise .25s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.msg{animation:none}}
  .avatar{
    width:30px;height:30px;border-radius:8px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;font-family:'Archivo';
  }
  .msg.bot .avatar{background:var(--duoc-yellow);color:var(--ink)}
  .msg.user{flex-direction:row-reverse}
  .msg.user .avatar{background:var(--ink);color:#fff}
  .bubble{
    max-width:84%;
    padding:11px 14px;
    border-radius:12px;
    font-size:14.5px;line-height:1.55;
    overflow-wrap:break-word;
  }
  .msg.bot .bubble{background:var(--surface);border:1px solid var(--line);border-top-left-radius:4px}
  .msg.user .bubble{background:var(--ink);color:#fff;border-top-right-radius:4px}
  .bubble p{margin:0 0 8px}
  .bubble p:last-child{margin:0}
  .bubble ul,.bubble ol{margin:4px 0 8px 18px}
  .bubble li{margin-bottom:4px}
  .bubble a{color:var(--link);font-weight:500;text-decoration:underline;text-underline-offset:2px;word-break:break-word}
  .msg.user .bubble a{color:var(--duoc-yellow)}
  .bubble strong{font-weight:600}
  .bubble code{background:#E9EBEF;padding:1px 5px;border-radius:4px;font-size:13px}
  .typing{display:inline-flex;align-items:center;gap:8px;padding:2px 0;font-size:13px;color:var(--ink-soft)}
  .typing .dots{display:inline-flex;gap:4px}
  .typing .dots span{width:7px;height:7px;border-radius:50%;background:#A8ADB7;animation:blink 1.2s infinite}
  .typing .dots span:nth-child(2){animation-delay:.2s}
  .typing .dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
  .chips{
    display:flex;flex-wrap:wrap;gap:8px;
    padding:0 18px 12px;flex-shrink:0;
  }
  .chip{
    background:var(--duoc-yellow-soft);
    border:1px solid #F2DA9A;
    color:var(--ink);
    font-size:12.5px;font-weight:500;font-family:'Inter';
    padding:7px 12px;border-radius:999px;
    cursor:pointer;transition:background .15s,transform .15s;
  }
  .chip:hover{background:var(--duoc-yellow);transform:translateY(-1px)}
  .chip:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .input-bar{
    display:flex;gap:8px;align-items:flex-end;
    padding:12px 16px;
    border-top:1px solid var(--line);
    background:var(--paper);flex-shrink:0;
  }
  .new-chat{
    width:44px;height:44px;border-radius:12px;flex-shrink:0;
    background:var(--surface);
    color:var(--ink-soft);
    border:1.5px solid var(--line);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s,color .15s,border-color .15s,transform .1s;
  }
  .new-chat:hover{background:var(--duoc-yellow-soft);color:var(--ink);border-color:#F2DA9A}
  .new-chat:active{transform:scale(.95)}
  .new-chat:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .new-chat svg{width:19px;height:19px}
  textarea{
    flex:1;resize:none;
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:11px 14px;
    font-family:'Inter';font-size:14.5px;line-height:1.4;
    max-height:120px;
    outline:none;transition:border-color .15s;
    background:var(--surface);
  }
  textarea:focus{border-color:var(--ink)}
  .send{
    width:44px;height:44px;border-radius:12px;border:none;
    background:var(--duoc-yellow);color:var(--ink);
    cursor:pointer;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s,transform .1s;
  }
  .send:hover{background:#FFD354}
  .send:active{transform:scale(.95)}
  .send:disabled{background:var(--line);cursor:not-allowed}
  .send svg{width:20px;height:20px}
  .send:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .footer-note{
    text-align:center;font-size:10.5px;color:#9AA0AB;
    padding:0 16px 10px;flex-shrink:0;
  }
  .footer-note a{color:#6B7280}
</style>
</head>
<body>
<div class="app" role="application" aria-label="Chatbot Bibliotecas Duoc UC">

  <header>
    <div class="logo-mark">B</div>
    <div class="header-text">
      <h1>Chatbot Bibliotecas Duoc UC</h1>
    </div>
  </header>

  <div class="chat" id="chat" aria-live="polite"></div>

  <div class="chips" id="chips">
    <button class="chip">Libros de mi asignatura</button>
    <button class="chip">Ayúdame a buscar un libro</button>
    <button class="chip">Ayúdame a estructurar mi informe</button>
    <button class="chip">¿Cómo cito en APA?</button>
    <button class="chip">¿Cómo renuevo mis préstamos?</button>
  </div>

  <div class="input-bar">
    <button class="new-chat" id="newChat" aria-label="Empezar una nueva conversación" title="Nueva conversación">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.36 2.64L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
    <textarea id="input" rows="1" placeholder="Escribe tu consulta…" aria-label="Escribe tu consulta"></textarea>
    <button class="send" id="send" aria-label="Enviar mensaje">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>

  <div class="footer-note">
    ¿Prefieres ayuda humana? <a href="https://bibliotecas.duoc.cl/consultanos" target="_blank" rel="noopener">Atención virtual</a>
  </div>
</div>

<script>
const API_URL = "https://chatbot-qy6a.onrender.com";

const chatEl   = document.getElementById('chat');
const inputEl  = document.getElementById('input');
const sendBtn  = document.getElementById('send');
const chipsEl  = document.getElementById('chips');
let history = [];
let busy = false;

function md(text){
  let h = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/(^|[^"'=\]>])(https?:\/\/[^\s<)\]"']+)/g, function(_, antes, url){
      // red de seguridad: URLs sueltas (texto plano) tambien se vuelven clicables
      var limpia = url.replace(/[.,;:!?]+$/, '');
      var cola = url.slice(limpia.length);
      return antes + '<a href="' + limpia + '" target="_blank" rel="noopener">' + limpia + '</a>' + cola;
    })
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>');
  const lines = h.split('\n');
  let out = [], inUl = false, inOl = false;
  for (const line of lines){
    const hd = line.match(/^\s*#{1,6}\s+(.*)/);
    if (hd){
      if(inUl){out.push('</ul>');inUl=false}
      if(inOl){out.push('</ol>');inOl=false}
      out.push('<p style="margin-top:6px"><strong>'+hd[1].replace(/[:*]+$/,'')+'</strong></p>');
      continue;
    }
    const ul = line.match(/^\s*[-•]\s+(.*)/);
    const ol = line.match(/^\s*\d+[.)]\s+(.*)/);
    if (ul){ if(inOl){out.push('</ol>');inOl=false} if(!inUl){out.push('<ul>');inUl=true} out.push('<li>'+ul[1]+'</li>'); }
    else if (ol){ if(inUl){out.push('</ul>');inUl=false} if(!inOl){out.push('<ol>');inOl=true} out.push('<li>'+ol[1]+'</li>'); }
    else {
      if(inUl){out.push('</ul>');inUl=false}
      if(inOl){out.push('</ol>');inOl=false}
      if(line.trim()) out.push('<p>'+line+'</p>');
    }
  }
  if(inUl) out.push('</ul>');
  if(inOl) out.push('</ol>');
  return out.join('');
}

function addMsg(role, html){
  const div = document.createElement('div');
  div.className = 'msg ' + (role==='user' ? 'user' : 'bot');
  div.innerHTML = `<div class="avatar">${role==='user'?'Tú':'B'}</div><div class="bubble">${html}</div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}
function addTyping(){
  return addMsg('bot',
    '<div class="typing"><span class="dots"><span></span><span></span><span></span></span><span class="typing-label">Dame un momento…</span></div>');
}

function updatePlaceholder(userText, botText){
  const ctx = ((userText||'') + ' ' + (botText||'')).toLowerCase();
  let ph = 'Escribe tu consulta…';
  if (/\bapa\b|cita|referencia|bibliograf/.test(ctx))
    ph = 'Pega aquí tu cita o referencia y la revisamos…';
  else if (/objetivo/.test(ctx))
    ph = 'Escribe tu objetivo y lo afinamos juntos…';
  else if (/marco te[óo]rico|introducci[óo]n|conclusi[óo]n|informe|ensayo|paper|proyecto/.test(ctx))
    ph = 'Cuéntame tu tema o pídeme el siguiente paso…';
  else if (/carrera|escuela/.test(ctx))
    ph = 'Dime tu carrera para sugerirte recursos…';
  else if (/descubridor|elibro|o'reilly|oreilly|jove|buscar|b[úu]squeda|colecci[óo]n digital/.test(ctx))
    ph = 'Pídeme otra búsqueda o afina tu tema…';
  else if (/renovar|renovaci[óo]n|multa|pr[ée]stamo|moroso|bloqueo/.test(ctx))
    ph = '¿Otra duda sobre tus préstamos?';
  else if (/sala|lentes vr|reserva/.test(ctx))
    ph = '¿Te ayudo con otra reserva o servicio?';
  else if (/taller|competencia/.test(ctx))
    ph = '¿Buscas un taller sobre algún tema en particular?';
  else if (/prueba|examen|estudiar|certamen/.test(ctx))
    ph = 'Dime la asignatura o el tema de tu prueba…';
  else if (/horario|sede|biblioteca/.test(ctx))
    ph = '¿Sobre qué sede necesitas información?';
  inputEl.placeholder = ph;
}

async function askClaude(userText){
  history.push({role:'user', content:userText});
  const typingEl = addTyping();
  const bubble = typingEl.querySelector('.bubble');
  busy = true; sendBtn.disabled = true;

  let acc = '';
  let rafPending = false;
  const renderNow = ()=>{
    rafPending = false;
    bubble.innerHTML = md(acc);
    chatEl.scrollTop = chatEl.scrollHeight;
  };
  const scheduleRender = ()=>{ if(!rafPending){ rafPending = true; requestAnimationFrame(renderNow); } };

  try{
    const response = await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ messages: history })
    });

    if(!response.ok || !response.body) throw new Error('HTTP '+response.status);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, {stream:true});
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for(const line of lines){
        const s = line.trim();
        if(!s.startsWith('data:')) continue;
        const payload = s.slice(5).trim();
        if(payload === '[DONE]') continue;
        let evt;
        try{ evt = JSON.parse(payload); }catch{ continue; }
        if(evt.type === 'content_block_delta' && evt.delta){
          if(evt.delta.type === 'text_delta' && evt.delta.text){
            if(!acc) bubble.classList.remove('is-typing');
            acc += evt.delta.text;
            scheduleRender();
          }
        }
        if(evt.type === 'content_block_start' && evt.content_block && evt.content_block.type === 'server_tool_use'){
          if(!acc){ bubble.innerHTML = '<div class="typing"><span class="dots"><span></span><span></span><span></span></span><span>Buscando en los recursos…</span></div>'; }
        }
      }
    }

    const reply = acc.trim() || 'Lo siento, tuve un problema al responder. ¿Puedes intentarlo de nuevo?';
    history.push({role:'assistant', content:reply});
    bubble.innerHTML = md(reply);
    updatePlaceholder(userText, reply);
  }catch(err){
    console.error(err);
    bubble.innerHTML =
      '<p>Hubo un problema de conexión. Intenta nuevamente, o contacta al staff de la biblioteca por <a href="https://bibliotecas.duoc.cl/consultanos" target="_blank" rel="noopener">Consúltanos</a>.</p>';
  }finally{
    busy = false; sendBtn.disabled = false;
    chatEl.scrollTop = chatEl.scrollHeight;
    inputEl.focus();
  }
}

function send(){
  const text = inputEl.value.trim();
  if(!text || busy) return;
  addMsg('user', md(text));
  inputEl.value = '';
  inputEl.style.height = 'auto';
  chipsEl.style.display = 'none';
  askClaude(text);
}
sendBtn.addEventListener('click', send);
inputEl.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
inputEl.addEventListener('input', ()=>{
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight,120)+'px';
});
chipsEl.addEventListener('click', e=>{
  if(e.target.classList.contains('chip')){
    inputEl.value = e.target.textContent;
    send();
  }
});

const WELCOME = `¡Hola! 👋 Soy tu asesor de Bibliotecas Duoc UC.

Puedo ayudarte a estructurar tu informe, preparar una prueba, buscar información confiable, citar en normas APA, resolver dudas sobre tu biblioteca… y muchas cosas más.

¿En qué te ayudo hoy? 🚀`;

function nuevaConversacion(){
  if(busy) return;
  history = [];
  chatEl.innerHTML = '';
  chipsEl.style.display = 'flex';
  inputEl.value = '';
  inputEl.style.height = 'auto';
  inputEl.placeholder = 'Escribe tu consulta…';
  addMsg('bot', md(WELCOME));
  inputEl.focus();
}
document.getElementById('newChat').addEventListener('click', nuevaConversacion);

addMsg('bot', md(WELCOME));
inputEl.focus();
</script>
</body>
</html>
